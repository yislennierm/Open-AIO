[platformio]
boards_dir = boards

[env:t-rgb-half-circle]
platform = espressif32@6.9.0
board = LilyGo-T-RGB
framework = arduino
extra_scripts =
  pre:scripts/enable_esp_dsp_for_jpegdec.py
  pre:scripts/patch_usb_vendor_stream_buffer.py
  pre:scripts/patch_lilygo_touch.py
  pre:scripts/patch_lilygo_framebuffer.py
  pre:scripts/patch_lilygo_panel_clock.py
monitor_speed = 460800
upload_speed = 115200
upload_flags =
  --no-stub
board_build.f_cpu = 240000000L
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_RUNNING_CORE=1
  -DCORE_DEBUG_LEVEL=0
lib_deps =
  bblanchon/ArduinoJson@^7.2.1
  xinyuan-lilygo/LilyGo-T-RGB@^1.0.5
  bitbank2/JPEGDEC@^1.8.2
  lewisxhe/SensorLib@0.2.3

[env:t-rgb-half-circle-rawusb]
; Recovery direction as of 2026-06-18:
; this target intentionally builds the lab stream firmware again.
; The previous production/app-detector merge path is considered legacy/non-working
; and should not be used as the base until it is rebuilt from the lab baseline.
extends = env:t-rgb-half-circle
board = LilyGo-T-RGB-RawUSB
board_build.variants_dir = variants
build_unflags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
build_flags =
  -DLILYGO_T_RGB
  -DUSB_VID=0x303A
  -DUSB_PID=0x4004
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSB_WEBUSB_ENABLED=true
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=1
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=0
  -DHAS_LILYGO_PANEL_FRAMEBUFFER=1
  -DSIGNALRGB_RAWUSB_EXPERIMENT=1
  -DSIGNALRGB_VIDEO_FAST_PATH=1
  -DNZXT_ESC_TEST_FIRMWARE=1

[env:t-rgb-nzxt-esc-test]
extends = env:t-rgb-half-circle-rawusb
build_flags =
  -DLILYGO_T_RGB
  -DUSB_VID=0x303A
  -DUSB_PID=0x4004
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DUSB_WEBUSB_ENABLED=true
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=1
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=0
  -DHAS_LILYGO_PANEL_FRAMEBUFFER=1
  -DSIGNALRGB_RAWUSB_EXPERIMENT=1
  -DSIGNALRGB_VIDEO_FAST_PATH=1
  -DNZXT_ESC_TEST_FIRMWARE=1


